<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pertanyaan Rahasia 🤭</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(to top, #ffe4e1, #ffc0cb);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            color: #ff4d6d;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        .btn-container {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            position: relative;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        #yesBtn {
            background-color: #4CAF50;
            color: white;
            animation-delay: 1s;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
            position: absolute;
            left: 120px;
            animation-delay: 1.2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LOVE */
        .love {
            position: absolute;
            bottom: -20px;
            font-size: 20px;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-800px); opacity: 0; }
        }
    </style>
</head>

<body>

    <h1>Apakah kamu suka aku? 🫣❤️</h1>

    <div class="btn-container">
        <button id="yesBtn">Iya ❤️</button>
        <button id="noBtn">Tidak 💔</button>
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");

        noBtn.addEventListener("mouseover", function() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);

            noBtn.style.position = "fixed";
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        });

        document.getElementById("yesBtn").addEventListener("click", function() {
            window.location.href = "https://wa.me/628xxxxxxxxxx?text=Aku%20juga%20suka%20kamu%20🫰❤️";
        });

        function createLove() {
            const love = document.createElement("div");
            love.classList.add("love");
            love.innerHTML = "❤️";

            love.style.left = Math.random() * window.innerWidth + "px";
            love.style.fontSize = (Math.random() * 20 + 15) + "px";
            love.style.animationDuration = (Math.random() * 3 + 2) + "s";

            document.body.appendChild(love);

            setTimeout(() => love.remove(), 5000);
        }

        setInterval(createLove, 300);
    </script>

</body>
  </html>
